<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open House Sign-In</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #1f2937;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      border-top: 4px solid #0b2e6f;
    }

    .logo {
      text-align: center;
      margin-bottom: 12px;
      font-size: 12px;
      letter-spacing: 1.5px;
      color: #0b2e6f;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 28px;
      color: #111827;
    }

    .sub {
      text-align: center;
      margin: 0 0 24px;
      color: #6b7280;
      font-size: 15px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin: 14px 0 6px;
      color: #374151;
    }

    input,
    select,
    textarea,
    button {
      width: 100%;
      font-size: 16px;
      border-radius: 10px;
    }

    input,
    select,
    textarea {
      padding: 14px 12px;
      border: 1px solid #d1d5db;
      background: #fff;
      outline: none;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #0b2e6f;
      box-shadow: 0 0 0 3px rgba(11, 46, 111, 0.12);
    }

    .checkbox-group {
      margin-top: 8px;
      display: grid;
      gap: 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      color: #374151;
    }

    .checkbox-item input {
      width: auto;
      transform: scale(1.1);
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }

    button {
      margin-top: 22px;
      padding: 15px;
      border: none;
      background: #0b2e6f;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.95;
    }

    .success-note {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="logo">Coldwell Banker Realty</div>
      <h1>Open House Sign-In</h1>
      <p class="sub">
        Please complete this quick form before touring the home.
      </p>

      <form action="https://formspree.io/f/myknooen" method="POST">
        <label for="name">Full Name</label>
        <input id="name" name="name" type="text" required />

        <label for="email">Email Address</label>
        <input id="email" name="email" type="email" required />

        <label for="phone">Phone Number</label>
        <input id="phone" name="phone" type="tel" required />

        <label for="source">How did you hear about this open house?</label>
        <select id="source" name="source">
          <option value="">Select one</option>
          <option value="Sign">Sign</option>
          <option value="Advertising">Advertising</option>
          <option value="Internet">Internet</option>
          <option value="Facebook">Facebook</option>
          <option value="Instagram">Instagram</option>
        </select>

        <label>Have you signed a buyer’s agent agreement?</label>
        <div class="checkbox-group">
          <label class="checkbox-item"><input type="radio" name="buyers_agent_agreement" value="Yes"> Yes</label>
          <label class="checkbox-item"><input type="radio" name="buyers_agent_agreement" value="No"> No</label>
        </div>

        <label for="brokerage">If yes, name/brokerage</label>
        <input id="brokerage" name="brokerage" type="text" />

        <label for="timeline">What is your timeframe for buying?</label>
        <select id="timeline" name="timeline">
          <option value="">Select one</option>
          <option value="1-3 months">1–3 months</option>
          <option value="3-6 months">3–6 months</option>
          <option value="1 year+">1 year+</option>
          <option value="Just looking">Just looking</option>
        </select>

        <input type="hidden" name="_subject" value="New Open House Sign-In Submission" />
        <input type="hidden" name="_captcha" value="false" />

        <button type="submit">Submit</button>
      </form>

      <p class="hint">Thank you for taking the time to tour this home.</p>
    </div>
  </div>
</body>
</html>
